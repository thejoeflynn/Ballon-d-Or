<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teams — FIFA World Cup 2026™</title>
  <link rel="icon" type="image/png" href="/logos/app-icon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/site.css"/>
  <style>
    /* ── Group filter ───────────────────────────────────────────── */
    .group-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 1.25rem;
    }
    .group-pill {
      padding: 4px 14px;
      border-radius: 999px;
      border: 1.5px solid rgba(255,255,255,0.35);
      background: transparent;
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.5px;
      transition: all 0.15s;
    }
    .group-pill:hover {
      border-color: rgba(255,255,255,0.7);
      color: #fff;
    }
    .group-pill.active {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--dark);
    }

    /* ── Team grid ──────────────────────────────────────────────── */
    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }

    .team-card {
      background: var(--panel);
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      color: var(--dark);
      display: flex;
      flex-direction: column;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .team-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.22);
    }

    .team-card-crest {
      background: rgba(45,18,0,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 0.75rem 0.75rem;
      min-height: 90px;
    }
    .team-card-crest img {
      width: 64px;
      height: 64px;
      object-fit: contain;
    }

    .team-card-body {
      padding: 0.6rem 0.75rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .team-card-flag img {
      width: 26px;
      height: 18px;
      object-fit: cover;
      border-radius: 3px;
    }

    .team-card-name {
      font-family: 'Oswald', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      line-height: 1.2;
      color: var(--dark);
    }

    .team-card-group {
      font-size: 11px;
      font-weight: 700;
      color: rgba(45,18,0,0.5);
    }
  </style>
</head>
<body>

<div class="app-shell">

  <!-- Sidebar -->
  <aside th:replace="~{fragments/sidebar :: sidebar('teams')}">nav</aside>

  <!-- Mobile top bar -->
  <div class="mobile-topbar">
    <img src="/logos/app-icon.png" alt="logo" style="height:28px;object-fit:contain;"/>
    <div style="display:flex;gap:6px;">
      <a href="/venues">Venues</a>
      <a href="/standings">Standings</a>
      <a href="/teams" style="color:#fff;">Teams</a>
    </div>
  </div>

  <main class="app-main">
    <div class="page-inner">

      <h1 class="page-title">Teams</h1>
      <p class="page-subtitle">All 48 nations competing at FIFA World Cup 2026™</p>

      <!-- Group filter pills -->
      <div class="group-filter">
        <a href="/teams"
           th:classappend="${activeGroup == 'ALL'} ? ' active' : ''"
           class="group-pill">All</a>
        <a th:each="g : ${groups}"
           th:href="@{/teams(group=${g})}"
           th:text="${g}"
           th:classappend="${activeGroup == g} ? ' active' : ''"
           class="group-pill">A</a>
      </div>

      <!-- Team cards grid -->
      <div class="teams-grid">
        <a th:each="team : ${teams}"
           th:href="@{'/teams/' + ${team.slug}}"
           class="team-card"
           th:attr="aria-label=${team.name}">

          <div class="team-card-crest">
            <img th:src="@{'/crests/' + ${team.slug} + '.png'}"
                 th:alt="${team.name}"
                 onerror="this.style.opacity='0'"/>
          </div>

          <div class="team-card-body">
            <div class="team-card-flag">
              <img th:src="@{'/flags/' + ${team.slug} + '.jpg'}"
                   th:alt="${team.name}"
                   onerror="this.style.display='none'"/>
            </div>
            <span class="team-card-name" th:text="${team.name}">Country</span>
            <span class="team-card-group" th:text="'Group ' + ${team.group}">Group A</span>
          </div>
        </a>
      </div>

    </div>
  </main>
</div>

</body>
</html>
