# Copy to application.properties and fill in real values for your environment.
# NEVER commit real secrets.

spring.application.name=world-cup-tracker
server.port=8080

# --- Database (added with the JPA entities in PLAN.md §2) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/worldcup
spring.datasource.username=your_db_user
spring.datasource.password=your_db_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# --- CORS ---
app.cors.allowed-origin=http://localhost:5173

# --- Integrations (called at seed time only) ---
api.football.key=YOUR_FOOTBALL_DATA_ORG_KEY
api.football.base-url=https://api.football-data.org/v4
api.anthropic.key=YOUR_CLAUDE_API_KEY
api.anthropic.model=claude-sonnet-4-6

# --- AI Commentary (Groq) ---
api.groq.base-url=https://api.groq.com
api.groq.key=YOUR_GROQ_API_KEY
api.groq.model=llama-3.3-70b-versatile
