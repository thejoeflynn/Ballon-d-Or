<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${match.homeName} + ' vs ' + ${match.awayName} + ' — FIFA World Cup 2026™'">Match</title>
  <link rel="icon" type="image/png" href="/logos/app-icon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/site.css"/>
  <style>
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 1.5rem;
      transition: color 0.15s;
    }
    .back-link:hover { color: #fff; }

    /* ── Match hero ─────────────────────────────────────────────── */
    .match-hero {
      background: var(--panel);
      border-radius: var(--radius);
      padding: 2rem 1.5rem 1.75rem;
      box-shadow: 0 6px 24px rgba(0,0,0,0.18);
      margin-bottom: 1.5rem;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 1.5rem;
    }

    .hero-team {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      text-align: center;
    }
    .hero-team-crest {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }
    .hero-team-flag {
      width: 32px;
      height: 22px;
      object-fit: cover;
      border-radius: 3px;
    }
    .hero-team-name {
      font-family: 'Oswald', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--dark);
      line-height: 1.2;
    }

    .hero-centre {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 100px;
    }
    .hero-score {
      font-family: 'Oswald', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--dark);
      letter-spacing: 4px;
      line-height: 1;
    }
    .hero-time {
      font-family: 'Oswald', sans-serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--dark);
      letter-spacing: 1px;
    }
    .hero-status {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 999px;
    }
    .status-final    { background: rgba(45,18,0,0.1);  color: rgba(45,18,0,0.5); }
    .status-live     { background: #fde8ec; color: #ef2b4b; }
    .status-upcoming { background: rgba(45,18,0,0.07); color: rgba(45,18,0,0.45); }

    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #ef2b4b; display: inline-block;
      animation: pulse 1.2s ease-in-out infinite;
      margin-right: 3px;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

    /* ── Match meta strip ───────────────────────────────────────── */
    .match-meta {
      background: var(--panel);
      border-radius: var(--radius);
      padding: 0.9rem 1.25rem;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .meta-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(45,18,0,0.45);
    }
    .meta-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--dark);
    }

    /* ── Commentary panel ───────────────────────────────────────── */
    .commentary-panel {
      background: var(--panel);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: 0 6px 24px rgba(0,0,0,0.18);
    }
    .commentary-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1rem;
    }
    .commentary-icon {
      font-size: 1.25rem;
      line-height: 1;
    }
    .commentary-title {
      font-family: 'Oswald', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--dark);
    }
    .commentary-ai-badge {
      margin-left: auto;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(45,18,0,0.45);
      background: rgba(45,18,0,0.06);
      padding: 3px 9px;
      border-radius: 999px;
    }

    .commentary-text {
      font-size: 15px;
      line-height: 1.7;
      color: rgba(45,18,0,0.82);
    }

    .commentary-absent {
      text-align: center;
      padding: 1rem 0 0.25rem;
    }
    .commentary-absent-label {
      font-family: 'Oswald', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(45,18,0,0.4);
      margin-bottom: 0.4rem;
    }
    .commentary-absent p {
      font-size: 13px;
      color: rgba(45,18,0,0.4);
    }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 520px) {
      .match-hero { gap: 0.75rem; padding: 1.5rem 1rem; }
      .hero-team-crest { width: 56px; height: 56px; }
      .hero-team-name { font-size: 0.85rem; }
      .hero-score { font-size: 2rem; }
    }
  </style>
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar('matches')}">nav</aside>

  <div class="mobile-topbar">
    <img src="/logos/app-icon.png" alt="logo" style="height:28px;object-fit:contain;"/>
    <div style="display:flex;gap:6px;">
      <a href="/venues">Venues</a>
      <a href="/standings">Standings</a>
      <a href="/matches" style="color:#fff;">Matches</a>
      <a href="/teams">Teams</a>
    </div>
  </div>

  <main class="app-main">
    <div class="page-inner">

      <a href="/matches" class="back-link">← All Matches</a>

      <!-- Match hero -->
      <div class="match-hero">

        <!-- Home team -->
        <div class="hero-team">
          <img class="hero-team-crest"
               th:src="@{'/crests/' + ${match.homeSlug} + '.png'}"
               th:alt="${match.homeName}"
               onerror="this.style.opacity='0'"/>
          <img class="hero-team-flag"
               th:src="@{'/flags/' + ${match.homeSlug} + '.jpg'}"
               th:alt="${match.homeName}"
               onerror="this.style.display='none'"/>
          <span class="hero-team-name" th:text="${match.homeName}">Home</span>
        </div>

        <!-- Centre -->
        <div class="hero-centre">
          <div th:if="${match.played or match.live}"
               class="hero-score"
               th:text="${match.homeScore} + ' – ' + ${match.awayScore}">0 – 0</div>
          <div th:unless="${match.played or match.live}"
               class="hero-time"
               th:text="${match.time}">3:00 PM</div>

          <span th:if="${match.live}" class="hero-status status-live">
            <span class="live-dot"></span>Live
          </span>
          <span th:if="${match.played}" class="hero-status status-final">Final</span>
          <span th:unless="${match.played or match.live}" class="hero-status status-upcoming">Upcoming</span>
        </div>

        <!-- Away team -->
        <div class="hero-team">
          <img class="hero-team-crest"
               th:src="@{'/crests/' + ${match.awaySlug} + '.png'}"
               th:alt="${match.awayName}"
               onerror="this.style.opacity='0'"/>
          <img class="hero-team-flag"
               th:src="@{'/flags/' + ${match.awaySlug} + '.jpg'}"
               th:alt="${match.awayName}"
               onerror="this.style.display='none'"/>
          <span class="hero-team-name" th:text="${match.awayName}">Away</span>
        </div>

      </div>

      <!-- Match meta -->
      <div class="match-meta">
        <div class="meta-item">
          <span class="meta-label">Date</span>
          <span class="meta-value" th:text="${match.date}">Jun 11</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Round</span>
          <span class="meta-value" th:text="${match.round}">Group A</span>
        </div>
        <div class="meta-item" th:if="${match.venue != null and !#strings.isEmpty(match.venue)}">
          <span class="meta-label">Venue</span>
          <span class="meta-value" th:text="${match.venue}">Stadium</span>
        </div>
      </div>

      <!-- AI Commentary panel -->
      <div class="commentary-panel">
        <div class="commentary-header">
          <span class="commentary-icon">🎙</span>
          <span class="commentary-title">Pre-Match Analysis</span>
          <span th:if="${commentary != null and !commentary.flagged and commentary.content != null}"
                class="commentary-ai-badge">AI-generated analysis</span>
        </div>

        <!-- Commentary present -->
        <div th:if="${commentary != null and !commentary.flagged and commentary.content != null}">
          <p class="commentary-text" th:text="${commentary.content}">Commentary text.</p>
        </div>

        <!-- Commentary absent or flagged -->
        <div th:unless="${commentary != null and !commentary.flagged and commentary.content != null}"
             class="commentary-absent">
          <div class="commentary-absent-label">Pre-match analysis coming soon</div>
          <p>Color commentary will be available before kickoff.</p>
        </div>
      </div>

    </div>
  </main>
</div>

</body>
</html>
