<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ballon d'Or — World Cup 2026</title>
    <link rel="icon" type="image/png" href="/logos/app-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />
    <script>
      // Apply saved text size before first paint (avoids a flash of default size).
      (function () {
        var s = parseFloat(localStorage.getItem('fontScale')) || 1.15;
        document.documentElement.style.setProperty('--font-scale', s);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
