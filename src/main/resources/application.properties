# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/worldcup
spring.datasource.username=worldcup_user
spring.datasource.password=worldcup123
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Seed data on first run ────────────────────────────────────────────────────
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# ── External API keys ─────────────────────────────────────────────────────────
api.football.key=YOUR_SPORTS_API_KEY
api.anthropic.key=YOUR_CLAUDE_API_KEY
api.anthropic.model=claude-sonnet-4-6
api.maps.key=YOUR_MAPS_API_KEY

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Fix: let Hibernate create tables before data.sql runs ────────────────────
spring.jpa.defer-datasource-initialization=true
