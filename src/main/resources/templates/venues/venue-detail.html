<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${venue.name} + ' — FIFA World Cup 2026™'">Venue — FIFA World Cup 2026™</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #FF6B35;
      --pink:   #E8407A;
      --gold:   #FFB830;
      --dark:   #2D1200;
      --white:  #FFFFFF;
      --radius: 14px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #FF6B35 0%, #FF9A5C 30%, #E8407A 70%, #C0306A 100%);
      min-height: 100vh;
      color: var(--dark);
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 28px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border-bottom: 1.5px solid rgba(255,255,255,0.35);
      position: sticky; top: 0; z-index: 999;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 16px; border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.18); color: var(--white);
      font-size: 13px; font-weight: 700; cursor: pointer;
      text-decoration: none; transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.32); }
    .header-title { font-size: 14px; font-weight: 800; color: var(--white);
      letter-spacing: 1px; text-transform: uppercase;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2); }
    .trophy { font-size: 26px; }

    /* ── Page layout ─────────────────────────────────────────────── */
    .page { max-width: 1600px; margin: 0 auto; padding: 32px 40px 60px; }

    /* ── Hero carousel ───────────────────────────────────────────── */
    .hero {
      width: 100%; height: 420px; border-radius: 20px; overflow: hidden;
      position: relative; background: rgba(255,255,255,0.15);
      box-shadow: 0 8px 40px rgba(0,0,0,0.2); margin-bottom: 28px;
    }
    .hero-bg-blur {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; filter: blur(30px) brightness(0.7); transform: scale(1.15);
      transition: opacity 0.4s ease;
    }
    .hero-img {
      position: relative; z-index: 1;
      width: 100%; height: 100%; object-fit: contain;
      transition: opacity 0.4s ease;
      cursor: zoom-in;
    }
    .hero-overlay {
      position: absolute; inset: 0; z-index: 2;
      background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 50%);
      pointer-events: none;
    }

    /* ── Lightbox ─────────────────────────────────────────────────── */
    .lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      z-index: 10000; display: none; align-items: center; justify-content: center;
      overflow: hidden; touch-action: none;
    }
    .lightbox.open { display: flex; }
    .lightbox-img {
      max-width: 88vw; max-height: 86vh; object-fit: contain;
      user-select: none; -webkit-user-drag: none; cursor: grab;
      transition: transform 0.25s ease, opacity 0.25s ease;
      will-change: transform;
    }
    .lightbox-img.dragging { transition: none; cursor: grabbing; }
    .lightbox-close {
      position: absolute; top: 20px; right: 28px;
      background: rgba(255,255,255,0.12); border: none; color: #fff;
      width: 42px; height: 42px; border-radius: 50%; font-size: 22px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; z-index: 10;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.25); }
    .lightbox-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.12); border: none; color: #fff;
      width: 50px; height: 50px; border-radius: 50%; font-size: 26px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; z-index: 10;
    }
    .lightbox-btn:hover { background: rgba(255,255,255,0.25); }
    .lightbox-btn.prev { left: 24px; }
    .lightbox-btn.next { right: 24px; }
    .lightbox-count {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.8); font-size: 13px; font-weight: 700;
      background: rgba(255,255,255,0.1); padding: 5px 14px; border-radius: 20px;
    }
    .hero-info {
      position: absolute; bottom: 24px; left: 28px; color: var(--white);
    }
    .hero-country { font-size: 12px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; opacity: 0.85; margin-bottom: 4px; }
    .hero-name { font-size: 32px; font-weight: 900; line-height: 1.1;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4); }
    .hero-city { font-size: 15px; opacity: 0.8; margin-top: 4px; }
    .hero-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,0.4); border: none; color: #fff;
      width: 44px; height: 44px; border-radius: 50%; font-size: 22px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; z-index: 10;
    }
    .hero-btn:hover { background: rgba(0,0,0,0.65); }
    .hero-btn.prev { left: 14px; }
    .hero-btn.next { right: 14px; }
    .hero-dots {
      position: absolute; bottom: 16px; right: 20px;
      display: flex; gap: 6px;
    }
    .hero-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.4); cursor: pointer; transition: background 0.2s;
    }
    .hero-dot.active { background: #fff; }
    .photo-count {
      position: absolute; top: 16px; right: 16px;
      background: rgba(0,0,0,0.45); color: #fff;
      font-size: 12px; font-weight: 700; padding: 4px 10px;
      border-radius: 20px; letter-spacing: 0.5px;
    }

    /* ── Content grid ────────────────────────────────────────────── */
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 460px;
      gap: 24px;
      align-items: start;
    }

    /* ── Card base ───────────────────────────────────────────────── */
    .card {
      background: rgba(255,255,255,0.93);
      border-radius: var(--radius); padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 11px; font-weight: 800; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--orange); margin-bottom: 16px;
    }

    /* ── Stats grid ──────────────────────────────────────────────── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .stat-box {
      background: rgba(255,107,53,0.06);
      border: 1px solid rgba(255,107,53,0.15);
      border-radius: 10px; padding: 14px 16px;
    }
    .stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--orange); margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 800; color: var(--dark); }
    .stat-sub { font-size: 11px; color: #888; margin-top: 2px; }

    /* ── Mini map ────────────────────────────────────────────────── */
    #mini-map {
      width: 100%; height: 260px; border-radius: 10px; overflow: hidden;
      border: 1px solid rgba(255,107,53,0.15);
    }

    /* ── Weather card ────────────────────────────────────────────── */
    .weather-row {
      display: flex; align-items: center; gap: 16px;
    }
    .weather-icon { font-size: 44px; line-height: 1; }
    .weather-temp { font-size: 28px; font-weight: 800; color: var(--dark); }
    .weather-label { font-size: 13px; color: #777; margin-top: 2px; }
    .weather-wind { font-size: 11px; color: #999; margin-top: 6px; }
    .weather-error { font-size: 13px; color: #aaa; text-align: center; padding: 16px 0; }

    /* ── Match placeholder ───────────────────────────────────────── */
    .match-placeholder {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px; padding: 32px 20px;
      text-align: center;
    }
    .match-placeholder .icon { font-size: 40px; opacity: 0.35; }
    .match-placeholder h3 { font-size: 15px; font-weight: 700; color: var(--dark); }
    .match-placeholder p { font-size: 13px; color: #888; max-width: 260px; line-height: 1.5; }
    .match-badge {
      display: inline-block; background: rgba(255,107,53,0.1);
      color: var(--orange); border: 1px solid rgba(255,107,53,0.3);
      border-radius: 20px; padding: 4px 14px; font-size: 11px; font-weight: 700;
      letter-spacing: 0.5px; margin-top: 4px;
    }

    /* ── Coordinates pill ────────────────────────────────────────── */
    .coords {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,107,53,0.08); border: 1px solid rgba(255,107,53,0.2);
      border-radius: 20px; padding: 5px 12px; font-size: 12px;
      color: var(--dark); font-family: monospace; margin-top: 12px;
    }

    /* ── Audio player ────────────────────────────────────────────── */
    .audio-player {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.18);
      border: 1.5px solid rgba(255,255,255,0.4);
      border-radius: 24px; padding: 6px 14px; backdrop-filter: blur(8px);
    }
    .audio-meta { display: flex; flex-direction: column; line-height: 1.2; }
    .audio-meta .song-title  { font-size: 11px; font-weight: 800; color: var(--white); white-space: nowrap; }
    .audio-meta .song-artist { font-size: 10px; color: rgba(255,255,255,0.65); }
    .audio-controls { display: flex; align-items: center; gap: 6px; }
    .audio-btn {
      background: none; border: none; cursor: pointer; color: var(--white);
      display: flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 50%; transition: all 0.2s; font-size: 14px;
    }
    .audio-btn:hover { background: rgba(255,255,255,0.2); }
    .play-btn {
      background: var(--white) !important; color: var(--orange) !important;
      width: 32px; height: 32px; font-size: 13px; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .play-btn:hover { background: rgba(255,255,255,0.9) !important; }
    .volume-slider {
      -webkit-appearance: none; width: 64px; height: 3px;
      background: rgba(255,255,255,0.3); border-radius: 2px; outline: none; cursor: pointer;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: var(--white); cursor: pointer;
    }
    .progress-wrap {
      width: 80px; height: 3px; background: rgba(255,255,255,0.3);
      border-radius: 2px; cursor: pointer; position: relative;
    }
    .progress-fill {
      height: 100%; background: var(--white); border-radius: 2px;
      width: 0%; transition: width 0.5s linear; pointer-events: none;
    }

    /* ── Attractions (big swipeable hero, mirrors stadium hero) ─────── */
    .a-hero-placeholder {
      position: absolute; inset: 0; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 80px;
      background: linear-gradient(135deg, rgba(255,107,53,0.18), rgba(232,64,122,0.18));
    }
    .attractions-loading { text-align:center; padding: 24px; color: #aaa; font-size:13px; }

    /* Place toggle — sits next to the "Nearby Attractions" header;     */
    /* picks which attraction's photos are shown in the hero below.     */
    .attractions-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
    }
    .place-toggle { display: flex; gap: 6px; flex-wrap: wrap; }
    .place-toggle-pill {
      padding: 6px 13px; border-radius: 20px;
      background: rgba(255,107,53,0.07); border: 1px solid rgba(255,107,53,0.25);
      color: var(--dark); font-size: 12px; font-weight: 700; cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .place-toggle-pill:hover { background: rgba(255,107,53,0.18); }
    .place-toggle-pill.active {
      background: var(--orange); border-color: var(--orange); color: #fff;
    }

    /* ── Share button ────────────────────────────────────────────── */
    .share-btn {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 12px; margin-left: 8px;
      padding: 5px 14px; border-radius: 20px; cursor: pointer;
      background: rgba(255,107,53,0.08); border: 1px solid rgba(255,107,53,0.25);
      color: var(--orange); font-size: 12px; font-weight: 700;
      transition: background 0.2s;
    }
    .share-btn:hover { background: rgba(255,107,53,0.2); }

    /* ── Toast ───────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--dark); color: #fff; padding: 10px 22px; border-radius: 24px;
      font-size: 13px; font-weight: 700; opacity: 0;
      transition: opacity 0.3s, transform 0.3s; pointer-events: none; z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Skeleton loader ─────────────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }
    .skeleton-row {
      height: 52px; border-radius: 10px; margin-bottom: 10px;
      background: linear-gradient(90deg, rgba(255,107,53,0.06) 25%, rgba(255,107,53,0.13) 50%, rgba(255,107,53,0.06) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite linear;
    }
    .skeleton-label {
      height: 10px; width: 45%; border-radius: 6px; margin-bottom: 14px;
      background: linear-gradient(90deg, rgba(255,107,53,0.06) 25%, rgba(255,107,53,0.13) 50%, rgba(255,107,53,0.06) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite linear;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="trophy">🏆</span>
    <span class="header-title">FIFA World Cup 2026™</span>
  </div>
  <a class="back-btn" id="backBtn" th:href="@{/venues}">← Venue Explorer</a>

  <div class="audio-player" id="audioPlayer" style="display:none">
    <span id="nowPlayingFlag" style="font-size:20px">🌍</span>
    <div class="audio-meta">
      <span class="song-title"  id="songTitle">Loading…</span>
      <span class="song-artist" id="songArtist"></span>
    </div>
    <div class="audio-controls">
      <button class="audio-btn play-btn" id="playBtn" onclick="togglePlay()">▶</button>
      <div class="progress-wrap" id="progressWrap" onclick="seekAudio(event)">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <button class="audio-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
      <input type="range" class="volume-slider" id="volSlider"
             min="0" max="1" step="0.05" value="0.6" oninput="setVolume(this.value)"/>
    </div>
  </div>
</header>

<div class="page">

  <!-- Hero Carousel -->
  <div class="hero" id="hero">
    <img class="hero-bg-blur" id="heroBgBlur" src="" alt="" aria-hidden="true"/>
    <img class="hero-img" id="heroImg" src="" alt="Stadium photo" onclick="openHeroLightbox()"/>
    <div class="hero-overlay"></div>
    <div class="hero-info">
      <div class="hero-country" th:text="${venue.flag + ' ' + venue.country}"></div>
      <div class="hero-name"  th:text="${venue.name}"></div>
      <div class="hero-city"  th:text="${venue.city}"></div>
    </div>
    <button class="hero-btn prev" id="heroPrev" onclick="heroPrev()">‹</button>
    <button class="hero-btn next" id="heroNext" onclick="heroNext()">›</button>
    <div class="hero-dots" id="heroDots"></div>
    <div class="photo-count" id="photoCount"></div>
  </div>

  <div class="content-grid">

    <!-- Left column -->
    <div>

      <!-- Stats -->
      <div class="card">
        <div class="card-title">Stadium Info</div>
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-label">Capacity</div>
            <div class="stat-value" th:text="${#numbers.formatInteger(venue.capacity, 1, 'COMMA')}"></div>
            <div class="stat-sub">seats</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">City</div>
            <div class="stat-value" style="font-size:16px" th:text="${venue.city}"></div>
            <div class="stat-sub" th:text="${venue.country}"></div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Host Nation</div>
            <div class="stat-value" style="font-size:28px" th:text="${venue.flag}"></div>
            <div class="stat-sub" th:text="${venue.country}"></div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Tournament</div>
            <div class="stat-value" style="font-size:16px">2026</div>
            <div class="stat-sub">FIFA World Cup™</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:0">
          <div class="coords">📍 <span th:text="${venue.lat + ', ' + venue.lng}"></span></div>
          <button class="share-btn" onclick="shareVenue()">🔗 Share</button>
        </div>
      </div>

      <!-- Match Schedule -->
      <div class="card">
        <div class="card-title">Match Schedule</div>
        <div style="padding:4px 0 8px">
          <div class="skeleton-label"></div>
          <div class="skeleton-row"></div>
          <div class="skeleton-row" style="opacity:0.7"></div>
          <div class="skeleton-row" style="opacity:0.45"></div>
          <p style="font-size:11px;color:#aaa;text-align:center;margin-top:12px;font-style:italic">
            Match fixtures loading soon…
          </p>
        </div>
      </div>

    </div>

    <!-- Right column -->
    <div>

      <!-- Mini Map -->
      <div class="card">
        <div class="card-title">Location</div>
        <div id="mini-map"></div>
      </div>

      <!-- Weather -->
      <div class="card">
        <div class="card-title">Weather</div>
        <div id="weatherBody">
          <div class="skeleton-row"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- Nearby Attractions — full width, matches hero -->
  <div class="card">
    <div class="attractions-header">
      <div class="card-title" style="margin-bottom:0">Nearby Attractions</div>
      <div class="place-toggle" id="placeToggle"></div>
    </div>
    <div id="attractionsContainer">
      <div class="attractions-loading">📍 Finding nearby attractions…</div>
    </div>
  </div>
</div>

<template id="attractionHeroTpl">
  <div class="hero" id="attractionHero">
    <img class="hero-bg-blur" id="aHeroBgBlur" src="" alt="" aria-hidden="true"/>
    <img class="hero-img" id="aHeroImg" src="" alt="" onclick="openAttractionLightbox()"/>
    <div class="a-hero-placeholder" id="aHeroPlaceholder" style="display:none"></div>
    <div class="hero-overlay"></div>
    <div class="hero-info">
      <div class="hero-country" id="aHeroType"></div>
      <div class="hero-name"  id="aHeroName"></div>
      <div class="hero-city"  id="aHeroDist"></div>
    </div>
    <button class="hero-btn prev" id="aHeroPrevBtn" onclick="aHeroPrev()">‹</button>
    <button class="hero-btn next" id="aHeroNextBtn" onclick="aHeroNext()">›</button>
    <div class="hero-dots" id="aHeroDots"></div>
    <div class="photo-count" id="aPhotoCount"></div>
  </div>
</template>

<!-- Hidden venue data for JS -->
<div id="venueData"
     th:data-id="${venue.id}"
     th:data-lat="${venue.lat}"
     th:data-lng="${venue.lng}"
     th:data-name="${venue.name}"
     style="display:none"></div>

<div id="toast">🔗 Link copied!</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="lightboxBgClick(event)">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-btn prev" id="lbPrev" onclick="lbNav(event,-1)">‹</button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="Stadium photo full view"/>
  <button class="lightbox-btn next" id="lbNext" onclick="lbNav(event,1)">›</button>
  <div class="lightbox-count" id="lbCount"></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  /* ── Mini map ──────────────────────────────────────────────────── */
  const vd   = document.getElementById('venueData');
  const vLat = parseFloat(vd.dataset.lat);
  const vLng = parseFloat(vd.dataset.lng);
  const vId  = vd.dataset.id;

  const miniMap = L.map('mini-map', { zoomControl: true, scrollWheelZoom: false })
    .setView([vLat, vLng], 13);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains: 'abcd', maxZoom: 19
  }).addTo(miniMap);

  const pinIcon = L.divIcon({
    className: '',
    html: `<div style="
      width:36px;height:36px;border-radius:50%;
      background:linear-gradient(135deg,#FF6B35,#E8407A);
      border:3px solid #fff;
      display:flex;align-items:center;justify-content:center;
      font-size:18px;box-shadow:0 3px 12px rgba(232,64,122,0.5)">🏟️</div>`,
    iconAnchor: [18, 18],
  });

  L.marker([vLat, vLng], { icon: pinIcon })
    .addTo(miniMap)
    .bindPopup(`<strong>${vd.dataset.name}</strong>`)
    .openPopup();

  /* ── Hero carousel ─────────────────────────────────────────────── */
  let heroImages = [];
  let heroIdx = 0;

  async function loadHeroImages() {
    try {
      heroImages = await fetch(`/api/venues/${vId}/images`).then(r => r.json());
    } catch(e) { heroImages = []; }

    const img    = document.getElementById('heroImg');
    const prev   = document.getElementById('heroPrev');
    const next   = document.getElementById('heroNext');
    const dots   = document.getElementById('heroDots');
    const count  = document.getElementById('photoCount');

    if (heroImages.length === 0) {
      img.style.background = 'linear-gradient(135deg,#FF6B35,#E8407A)';
      img.style.cursor = 'default';
      img.onclick = null;
      prev.style.display = next.style.display = 'none';
      return;
    }

    prev.style.display = heroImages.length > 1 ? 'flex' : 'none';
    next.style.display = heroImages.length > 1 ? 'flex' : 'none';

    dots.innerHTML = heroImages.map((_, i) =>
      `<div class="hero-dot ${i === 0 ? 'active' : ''}" onclick="heroGoto(${i})"></div>`
    ).join('');

    renderHero();
  }

  function renderHero() {
    const img    = document.getElementById('heroImg');
    const bgBlur = document.getElementById('heroBgBlur');
    img.style.opacity = '0';
    img.src = heroImages[heroIdx];
    bgBlur.src = heroImages[heroIdx];
    img.onload = () => { img.style.opacity = '1'; };

    document.getElementById('photoCount').textContent =
      `${heroIdx + 1} / ${heroImages.length}`;

    document.querySelectorAll('#hero .hero-dot').forEach((d, i) =>
      d.classList.toggle('active', i === heroIdx));
  }

  function heroPrev() {
    heroIdx = (heroIdx - 1 + heroImages.length) % heroImages.length;
    renderHero();
  }
  function heroNext() {
    heroIdx = (heroIdx + 1) % heroImages.length;
    renderHero();
  }
  function heroGoto(i) { heroIdx = i; renderHero(); }

  function openHeroLightbox() {
    openLightbox(heroImages, heroIdx, (i) => { heroIdx = i; renderHero(); });
  }

  /* ── Lightbox (clickable + draggable/swipeable full view) ───────── */
  /* Generic — works for both the stadium hero gallery and the        */
  /* nearby-attractions gallery via openLightbox(images, idx, onChange) */
  const lightbox    = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  let lbImages = [], lbIdx = 0, lbOnChange = null;

  function openLightbox(images, idx, onChange) {
    if (!images || !images.length) return;
    lbImages = images; lbIdx = idx || 0; lbOnChange = onChange || null;
    renderLightbox();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }
  function lightboxBgClick(e) {
    if (e.target === lightbox) closeLightbox();
  }
  function renderLightbox() {
    lightboxImg.style.opacity = '0';
    lightboxImg.src = lbImages[lbIdx];
    lightboxImg.onload = () => { lightboxImg.style.opacity = '1'; };
    document.getElementById('lbCount').textContent = `${lbIdx + 1} / ${lbImages.length}`;
    const multi = lbImages.length > 1;
    document.getElementById('lbPrev').style.display = multi ? 'flex' : 'none';
    document.getElementById('lbNext').style.display = multi ? 'flex' : 'none';
  }
  function lbNav(e, dir) {
    if (e && e.stopPropagation) e.stopPropagation();
    lbIdx = (lbIdx + dir + lbImages.length) % lbImages.length;
    renderLightbox();
    if (lbOnChange) lbOnChange(lbIdx);
  }

  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft')  lbNav(e, -1);
    if (e.key === 'ArrowRight') lbNav(e, 1);
  });

  // Drag / swipe to navigate
  let dragStartX = null, dragDeltaX = 0, isDragging = false;

  function dragStart(x) {
    dragStartX = x; dragDeltaX = 0; isDragging = true;
    lightboxImg.classList.add('dragging');
  }
  function dragMove(x) {
    if (!isDragging) return;
    dragDeltaX = x - dragStartX;
    lightboxImg.style.transform = `translateX(${dragDeltaX}px)`;
  }
  function dragEnd() {
    if (!isDragging) return;
    isDragging = false;
    lightboxImg.classList.remove('dragging');
    const threshold = 80;
    if (dragDeltaX > threshold && lbImages.length > 1) {
      lightboxImg.style.transform = '';
      lbNav({ stopPropagation(){} }, -1);
    } else if (dragDeltaX < -threshold && lbImages.length > 1) {
      lightboxImg.style.transform = '';
      lbNav({ stopPropagation(){} }, 1);
    } else {
      lightboxImg.style.transform = '';
    }
    dragStartX = null; dragDeltaX = 0;
  }

  lightboxImg.addEventListener('mousedown',  (e) => dragStart(e.clientX));
  window.addEventListener('mousemove', (e) => dragMove(e.clientX));
  window.addEventListener('mouseup',   dragEnd);

  lightboxImg.addEventListener('touchstart', (e) => dragStart(e.touches[0].clientX), { passive: true });
  lightboxImg.addEventListener('touchmove',  (e) => dragMove(e.touches[0].clientX), { passive: true });
  lightboxImg.addEventListener('touchend',   dragEnd);

  /* ── Audio player ──────────────────────────────────────────────── */
  const TRACKS = {
    '/audio/anthem.mp3':     { title: 'FIFA World Cup 2026™ Anthem', artist: 'Official Soundtrack', flag: '🌍' },
    '/audio/dna.mp3':        { title: 'DNA',                          artist: '🇺🇸 United States',   flag: '🇺🇸' },
    '/audio/goals.mp3':      { title: 'GOALS',                        artist: '🇨🇦 Canada',           flag: '🇨🇦' },
    '/audio/daidai.mp3':     { title: 'Daidai',                       artist: '🇲🇽 México',           flag: '🇲🇽' },
  };

  let bgAudio = null;
  let isMuted = false, lastVol = 0.6;

  const savedTrack = sessionStorage.getItem('currentTrack');
  if (savedTrack && sessionStorage.getItem('splashDone')) {
    bgAudio = new Audio(savedTrack);
    bgAudio.loop = true;
    bgAudio.volume = 0.6;
    bgAudio.play().catch(() => {});

    const meta = TRACKS[savedTrack] || { title: savedTrack, artist: '', flag: '🎵' };
    document.getElementById('songTitle').textContent   = meta.title;
    document.getElementById('songArtist').textContent  = meta.artist;
    document.getElementById('nowPlayingFlag').textContent = meta.flag;
    document.getElementById('audioPlayer').style.display = 'flex';

    bgAudio.addEventListener('play',  () => { document.getElementById('playBtn').textContent = '⏸'; });
    bgAudio.addEventListener('pause', () => { document.getElementById('playBtn').textContent = '▶'; });
    bgAudio.addEventListener('timeupdate', () => {
      if (bgAudio.duration)
        document.getElementById('progressFill').style.width =
          (bgAudio.currentTime / bgAudio.duration * 100) + '%';
    });
  }

  function togglePlay() {
    if (!bgAudio) return;
    bgAudio.paused ? bgAudio.play().catch(() => {}) : bgAudio.pause();
  }
  function toggleMute() {
    if (!bgAudio) return;
    isMuted = !isMuted; bgAudio.muted = isMuted;
    document.getElementById('muteBtn').textContent  = isMuted ? '🔇' : '🔊';
    document.getElementById('volSlider').value = isMuted ? 0 : lastVol;
  }
  function setVolume(val) {
    if (!bgAudio) return;
    bgAudio.volume = val; lastVol = val;
    isMuted = val == 0; bgAudio.muted = isMuted;
    document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
  }
  function seekAudio(e) {
    if (!bgAudio || !bgAudio.duration) return;
    const rect = document.getElementById('progressWrap').getBoundingClientRect();
    bgAudio.currentTime = ((e.clientX - rect.left) / rect.width) * bgAudio.duration;
  }

  /* ── Back button — return to country map ──────────────────────── */
  const fromCountry = new URLSearchParams(window.location.search).get('from');
  const backBtn = document.getElementById('backBtn');
  if (fromCountry && backBtn) {
    backBtn.href = `/venues?enter=${fromCountry}`;
    backBtn.textContent = `← Back to ${fromCountry}`;
  }

  loadHeroImages();

  /* ── Weather ───────────────────────────────────────────────────── */

    const body = document.getElementById('weatherBody');
    try {
      const w = await fetch(`/api/venues/${vId}/weather`).then(r => r.json());
      if (!w || w.tempF === undefined) throw new Error('no data');

      body.innerHTML = `
        <div class="weather-row">
          <div class="weather-icon">${w.icon}</div>
          <div>
            <div class="weather-temp">${Math.round(w.tempF)}°F</div>
            <div class="weather-label">${w.label}</div>
          </div>
        </div>
        <div class="weather-wind">💨 Wind ${Math.round(w.windMph)} mph</div>
      `;
    } catch (e) {
      body.innerHTML = `<div class="weather-error">Weather unavailable right now.</div>`;
    }
  }
  loadWeather();

  /* ── Nearby Attractions ───────────────────────────────────────── */

      { name: 'Barrio Antiguo',           type: 'Historic',   icon: '🏘️', dist: '15 km' },

  /* Place selection happens via the toggle pills next to the card      */
  /* header. The hero below only ever slides through the CURRENT        */
  /* place's photos (arrows, dots, drag/swipe) — same interaction as    */
  /* the stadium photo hero.                                            */
  let aPhotoSets = [];   // [[url, url, url], ...] one array per attraction
  let aPlaceIdx = 0, aPhotoIdx = 0;

  async function loadAttractions() {
    const container = document.getElementById('attractionsContainer');
    const attractions = VENUE_ATTRACTIONS[+vId];

    if (!attractions) {
      container.innerHTML = `<div class="attractions-loading">No attractions listed for this venue yet.</div>`;
      return;
    }

    // Fetch seeded photo sets — one array of image URLs per attraction
    try {
      aPhotoSets = await fetch(`/api/venues/${vId}/attraction-images`).then(r => r.json());
    } catch(e) { aPhotoSets = []; }

    // Place toggle — sits next to the "Nearby Attractions" header
    const placeToggle = document.getElementById('placeToggle');
    placeToggle.innerHTML = attractions.map((a, i) =>
      `<div class="place-toggle-pill ${i === 0 ? 'active' : ''}" onclick="aHeroGotoPlace(${i})">${a.icon} ${a.name}</div>`
    ).join('');

    container.innerHTML = '';
    container.appendChild(document.getElementById('attractionHeroTpl').content.cloneNode(true));

    aPlaceIdx = 0; aPhotoIdx = 0;
    renderAttractionHero();
    attachSwipe(document.getElementById('aHeroImg'), aHeroNext, aHeroPrev);
  }

  function renderAttractionHero() {
    const attractions = VENUE_ATTRACTIONS[+vId];
    const place  = attractions[aPlaceIdx];
    const photos = aPhotoSets[aPlaceIdx] || [];
    const url    = photos[aPhotoIdx];
    const img    = document.getElementById('aHeroImg');
    const bg     = document.getElementById('aHeroBgBlur');
    const ph     = document.getElementById('aHeroPlaceholder');
    const prevBtn = document.getElementById('aHeroPrevBtn');
    const nextBtn = document.getElementById('aHeroNextBtn');

    if (url) {
      img.style.display = ''; bg.style.display = ''; ph.style.display = 'none';
      img.style.opacity = '0';
      img.src = url; bg.src = url;
      img.onload = () => { img.style.opacity = '1'; };
    } else {
      img.style.display = 'none'; bg.style.display = 'none';
      ph.style.display = 'flex';
      ph.textContent = place.icon;
    }

    document.getElementById('aHeroType').textContent = `${place.icon} ${place.type}`;
    document.getElementById('aHeroName').textContent  = place.name;
    document.getElementById('aHeroDist').textContent  = `📍 ${place.dist} from stadium`;
    document.getElementById('aPhotoCount').textContent =
      photos.length ? `${aPhotoIdx + 1} / ${photos.length}` : '';

    prevBtn.style.display = nextBtn.style.display = photos.length > 1 ? 'flex' : 'none';

    // Dots — one per photo of the CURRENT place
    const dotsEl = document.getElementById('aHeroDots');
    dotsEl.innerHTML = photos.map((_, i) =>
      `<div class="hero-dot ${i === aPhotoIdx ? 'active' : ''}" onclick="aSetPhoto(event, ${i})"></div>`
    ).join('');

    document.querySelectorAll('#placeToggle .place-toggle-pill').forEach((el, i) =>
      el.classList.toggle('active', i === aPlaceIdx));
  }

  function aHeroNext() {
    const photos = aPhotoSets[aPlaceIdx] || [];
    if (photos.length < 2) return;
    aPhotoIdx = (aPhotoIdx + 1) % photos.length;
    renderAttractionHero();
  }
  function aHeroPrev() {
    const photos = aPhotoSets[aPlaceIdx] || [];
    if (photos.length < 2) return;
    aPhotoIdx = (aPhotoIdx - 1 + photos.length) % photos.length;
    renderAttractionHero();
  }
  function aHeroGotoPlace(i) { aPlaceIdx = i; aPhotoIdx = 0; renderAttractionHero(); }
  function aSetPhoto(e, i) { e.stopPropagation(); aPhotoIdx = i; renderAttractionHero(); }

  function openAttractionLightbox() {
    const photos = aPhotoSets[aPlaceIdx] || [];
    if (!photos.length) return;
    openLightbox(photos, aPhotoIdx, (newIdx) => {
      aPhotoIdx = newIdx;
      renderAttractionHero();
    });
  }

  /* Generic drag/swipe helper — used for the inline attraction hero    */
  function attachSwipe(el, onSwipeLeft, onSwipeRight) {
    let startX = null, dx = 0, dragging = false;
    const start = (x) => { startX = x; dx = 0; dragging = true; };
    const move  = (x) => { if (dragging) dx = x - startX; };
    const end   = () => {
      if (!dragging) return;
      dragging = false;
      const threshold = 50;
      if (dx < -threshold) onSwipeLeft();
      else if (dx > threshold) onSwipeRight();
      dx = 0; startX = null;
    };
    el.addEventListener('mousedown', (e) => start(e.clientX));
    window.addEventListener('mousemove', (e) => move(e.clientX));
    window.addEventListener('mouseup', end);
    el.addEventListener('touchstart', (e) => start(e.touches[0].clientX), { passive: true });
    el.addEventListener('touchmove',  (e) => move(e.touches[0].clientX),  { passive: true });
    el.addEventListener('touchend', end);
  }

  loadAttractions();

  /* ── Share button ──────────────────────────────────────────────── */
  function shareVenue() {
    const url = window.location.href;
    navigator.clipboard.writeText(url).then(() => showToast('🔗 Link copied!'))
      .catch(() => { prompt('Copy this link:', url); });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
