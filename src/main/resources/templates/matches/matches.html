<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Matches — FIFA World Cup 2026™</title>
  <link rel="icon" type="image/png" href="/logos/app-icon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/site.css"/>
  <style>

    /* ── Filter pills ─────────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    .filter-pill {
      padding: 5px 16px;
      border-radius: 999px;
      border: 1.5px solid rgba(255,255,255,0.35);
      background: transparent;
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.5px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .filter-pill:hover { border-color: rgba(255,255,255,0.7); color: #fff; }
    .filter-pill.active { background: var(--gold); border-color: var(--gold); color: var(--dark); }

    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #ef2b4b; display: inline-block;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

    /* ── Date group ───────────────────────────────────────────────── */
    .date-group { margin-bottom: 2rem; }
    .date-label {
      font-family: 'Oswald', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }

    .match-list { display: flex; flex-direction: column; gap: 8px; }

    /* ── Match card ───────────────────────────────────────────────── */
    .match-card {
      background: var(--panel);
      border-radius: 12px;
      padding: 0 14px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      min-height: 64px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.12);
      transition: transform 0.12s, box-shadow 0.12s;
      text-decoration: none;
      color: inherit;
    }
    .match-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.18);
    }
    .match-card.is-live {
      border-left: 3px solid #ef2b4b;
    }

    /* Home team (left-aligned) */
    .team-home {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-end;
    }
    .team-home .team-name {
      text-align: right;
    }

    /* Away team (right-aligned) */
    .team-away {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-start;
    }
    .team-away .team-name {
      text-align: left;
    }

    .team-flag {
      width: 28px;
      height: 20px;
      object-fit: cover;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .team-name {
      font-family: 'Oswald', sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--dark);
      white-space: nowrap;
    }
    .team-abbr-mobile { display: none; }

    /* Centre score / status */
    .match-centre {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 80px;
    }
    .score {
      font-family: 'Oswald', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
      letter-spacing: 2px;
    }
    .status-badge {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 999px;
    }
    .status-final    { background: rgba(45,18,0,0.1); color: rgba(45,18,0,0.5); }
    .status-live     { background: #fde8ec; color: #ef2b4b; }
    .status-upcoming { background: rgba(45,18,0,0.07); color: rgba(45,18,0,0.45); }

    .match-time {
      font-size: 12px;
      font-weight: 700;
      color: rgba(45,18,0,0.6);
    }
    .match-round {
      font-size: 10px;
      color: rgba(45,18,0,0.4);
      white-space: nowrap;
    }

    /* ── Responsive ───────────────────────────────────────────────── */
    @media (max-width: 540px) {
      .team-name { display: none; }
      .team-abbr-mobile {
        display: block;
        font-family: 'Oswald', sans-serif;
        font-size: 14px;
        font-weight: 700;
        color: var(--dark);
        text-transform: uppercase;
      }
      .match-card { padding: 0 10px; gap: 8px; }
    }
  </style>
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar('matches')}">nav</aside>

  <div class="mobile-topbar">
    <img src="/logos/app-icon.png" alt="logo" style="height:28px;object-fit:contain;"/>
    <div style="display:flex;gap:6px;">
      <a href="/venues">Venues</a>
      <a href="/standings">Standings</a>
      <a href="/matches" style="color:#fff;">Matches</a>
      <a href="/teams">Teams</a>
    </div>
  </div>

  <main class="app-main">
    <div class="page-inner">

      <h1 class="page-title">Matches</h1>
      <p class="page-subtitle"
         th:text="${totalCount} + ' match' + (${totalCount} != 1 ? 'es' : '') + ' shown'">
        Matches shown
      </p>

      <!-- Filter bar -->
      <div class="filter-bar">
        <a href="/matches?filter=ALL"
           th:classappend="${filter == 'ALL'} ? ' active' : ''"
           class="filter-pill">All</a>

        <a href="/matches?filter=LIVE"
           th:classappend="${filter == 'LIVE'} ? ' active' : ''"
           class="filter-pill">
          <span class="live-dot"></span> Live
          <span th:if="${liveCount > 0}"
                th:text="'(' + ${liveCount} + ')'"
                style="opacity:.75"></span>
        </a>

        <a href="/matches?filter=FINAL"
           th:classappend="${filter == 'FINAL'} ? ' active' : ''"
           class="filter-pill">Completed</a>

        <a href="/matches?filter=UPCOMING"
           th:classappend="${filter == 'UPCOMING'} ? ' active' : ''"
           class="filter-pill">Upcoming</a>
      </div>

      <!-- Matches grouped by date -->
      <div th:each="entry : ${byDate}" class="date-group">
        <div class="date-label" th:text="${entry.key}">Jun 11</div>
        <div class="match-list">
          <a th:each="m : ${entry.value}"
             th:href="@{'/matches/' + ${m.number}}"
             th:classappend="${m.live} ? ' is-live' : ''"
             class="match-card">

            <!-- Home team -->
            <div class="team-home">
              <span class="team-name" th:text="${m.homeName}">Home</span>
              <span class="team-abbr-mobile" th:text="${m.homeAbbr}">HOM</span>
              <img class="team-flag"
                   th:src="@{'/flags/' + ${m.homeSlug} + '.jpg'}"
                   th:alt="${m.homeName}"
                   onerror="this.style.display='none'"/>
            </div>

            <!-- Centre: score or time -->
            <div class="match-centre">
              <!-- Played or live: show score -->
              <div th:if="${m.played or m.live}" class="score"
                   th:text="${m.homeScore} + ' – ' + ${m.awayScore}">0 – 0</div>
              <!-- Upcoming: show time -->
              <div th:unless="${m.played or m.live}" class="match-time"
                   th:text="${m.time}">3:00 PM</div>

              <!-- Status badge -->
              <span th:if="${m.live}"
                    class="status-badge status-live">
                <span class="live-dot" style="width:5px;height:5px;margin-right:3px;"></span>Live
              </span>
              <span th:if="${m.played}"
                    class="status-badge status-final">Final</span>
              <span th:unless="${m.played or m.live}"
                    class="status-badge status-upcoming">Upcoming</span>

              <span class="match-round" th:text="${m.round}">Group A</span>
            </div>

            <!-- Away team -->
            <div class="team-away">
              <img class="team-flag"
                   th:src="@{'/flags/' + ${m.awaySlug} + '.jpg'}"
                   th:alt="${m.awayName}"
                   onerror="this.style.display='none'"/>
              <span class="team-name" th:text="${m.awayName}">Away</span>
              <span class="team-abbr-mobile" th:text="${m.awayAbbr}">AWY</span>
            </div>

          </a>
        </div>
      </div>

      <!-- Empty state -->
      <div th:if="${#maps.size(byDate) == 0}"
           style="text-align:center;padding:3rem 0;color:rgba(255,255,255,0.55);">
        <p style="font-family:'Oswald',sans-serif;font-size:1.1rem;text-transform:uppercase;letter-spacing:1px;">
          No matches found
        </p>
      </div>

    </div>
  </main>
</div>

</body>
</html>
