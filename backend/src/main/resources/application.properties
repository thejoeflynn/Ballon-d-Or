spring.application.name=world-cup-tracker
server.port=8081

# CORS — allow the React dev server (PLAN.md §1)
app.cors.allowed-origin=http://localhost:5173

# NOTE: Datasource/JPA and integration keys (football-data.org, Maps, Claude)
# are introduced in PLAN.md §2 along with the entities. This skeleton runs
# web-only so it boots without PostgreSQL. See application.example.properties
# for the full key set, and keep real secrets out of committed files.

spring.datasource.url=jdbc:postgresql://localhost:5432/worldcup
spring.datasource.username=colin
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

api.provider=api-football
api.football.base-url=https://v3.football.api-sports.io
api.football.key=d31fb5af33b54c4953ac99e2d441d445
api.football.world-cup-league-id=1
api.football.season=2026
api.football.min-refresh-minutes=30
api.cache.static-minutes=10080
api.cache.results-minutes=15