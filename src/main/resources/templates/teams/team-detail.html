<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${team.name} + ' — FIFA World Cup 2026™'">Team</title>
  <link rel="icon" type="image/png" href="/logos/app-icon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/site.css"/>
  <style>
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 1.5rem;
      transition: color 0.15s;
    }
    .back-link:hover { color: #fff; }

    .team-hero {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .team-hero-crest {
      background: var(--panel);
      border-radius: var(--radius);
      padding: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 24px rgba(0,0,0,0.18);
      flex-shrink: 0;
    }
    .team-hero-crest img {
      width: 100px;
      height: 100px;
      object-fit: contain;
    }
    .team-hero-info { color: var(--white); }
    .team-hero-flag img {
      width: 32px;
      height: 22px;
      object-fit: cover;
      border-radius: 3px;
      margin-bottom: 0.5rem;
    }
    .team-hero-name {
      font-family: 'Oswald', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      line-height: 1;
      margin-bottom: 0.4rem;
    }
    .team-hero-meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .team-hero-abbr {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.6);
    }
    .team-hero-group {
      background: rgba(255,184,48,0.2);
      border: 1px solid rgba(255,184,48,0.4);
      color: var(--gold);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 3px 10px;
      border-radius: 999px;
    }

    .coming-soon {
      background: var(--panel);
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
      box-shadow: 0 6px 24px rgba(0,0,0,0.18);
    }
    .coming-soon-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .coming-soon-label {
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(45,18,0,0.5);
      margin-bottom: 0.5rem;
    }
    .coming-soon p {
      font-size: 13px;
      color: rgba(45,18,0,0.5);
      max-width: 340px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar('teams')}">nav</aside>

  <div class="mobile-topbar">
    <img src="/logos/app-icon.png" alt="logo" style="height:28px;object-fit:contain;"/>
    <div style="display:flex;gap:6px;">
      <a href="/venues">Venues</a>
      <a href="/standings">Standings</a>
      <a href="/teams" style="color:#fff;">Teams</a>
    </div>
  </div>

  <main class="app-main">
    <div class="page-inner">

      <a href="/teams" class="back-link">← All Teams</a>

      <div class="team-hero">
        <div class="team-hero-crest">
          <img th:src="@{'/crests/' + ${team.slug} + '.png'}"
               th:alt="${team.name}"
               onerror="this.style.opacity='0'"/>
        </div>
        <div class="team-hero-info">
          <div class="team-hero-flag">
            <img th:src="@{'/flags/' + ${team.slug} + '.jpg'}"
                 th:alt="${team.name}"
                 onerror="this.style.display='none'"/>
          </div>
          <div class="team-hero-name" th:text="${team.name}">Country</div>
          <div class="team-hero-meta">
            <span class="team-hero-abbr" th:text="${team.abbr}">ABC</span>
            <span class="team-hero-group" th:text="'GROUP ' + ${team.group}">GROUP A</span>
          </div>
        </div>
      </div>

      <div class="coming-soon">
        <div class="coming-soon-icon">🏆</div>
        <div class="coming-soon-label">World Cup History &amp; Squad Roster</div>
        <p>Full team profile with tournament appearances, best finish, and 26-player squad — coming soon.</p>
      </div>

    </div>
  </main>
</div>

</body>
</html>
